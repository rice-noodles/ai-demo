spring:
  application:
    name: ai-demo
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/test?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-R1-0528-Qwen3-8B

monitoring:
  ai:
    pricing:
      input-per-1k-tokens-usd: ${AI_PRICE_INPUT_PER_1K:0.00055}
      output-per-1k-tokens-usd: ${AI_PRICE_OUTPUT_PER_1K:0.00219}

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: dev
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ai.chat.request.duration: true
        gen_ai.client.operation.duration: true
  tracing:
    sampling:
      probability: 1.0

nl2sql:
  default-dialect: MySQL
  default-schema: ${NL2SQL_DEFAULT_SCHEMA:}
  default-rules: ${NL2SQL_DEFAULT_RULES:仅生成查询 SQL，不要生成 INSERT/UPDATE/DELETE/DDL。}
  auto-read-schema: ${NL2SQL_AUTO_READ_SCHEMA:true}
  schema-table-limit: ${NL2SQL_SCHEMA_TABLE_LIMIT:30}
  schema-column-limit: ${NL2SQL_SCHEMA_COLUMN_LIMIT:50}
  default-max-rows: ${NL2SQL_DEFAULT_MAX_ROWS:200}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
